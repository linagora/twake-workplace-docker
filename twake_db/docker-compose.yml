version: "3.9"
services:
  ldap:
    image: osixia/openldap:1.5.0
    container_name: ldap
    environment:
      LDAP_DOMAIN: "twake.local"
      LDAP_ADMIN_PASSWORD: admin
    volumes:
      - ./ldap/bootstrap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    restart: unless-stopped
    ports:
      - "389:389"
    command: ["--copy-service", "--loglevel", "debug"]
    networks:
      - twake-network
      
      
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./postgres/init-db-postgres:/docker-entrypoint-initdb.d/
      - ./postgres/scripts:/scripts/

    networks:
      - twake-network

  valkey:
    image: bitnamilegacy/valkey
    container_name: visio-valkey
    environment:
      VALKEY_PASSWORD: valkeypass
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - twake-network

  couchdb:
    image: couchdb:latest
    container_name: couchdb
    restart: unless-stopped
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
      COUCHDB_HOST: couchdb
    volumes:
      - ./data/couchdb:/opt/couchdb/data
    ports:
      - "5984:5984"  
    networks:
      - twake-network  
      
  mongodb:
    image: mongo:6
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoroot
      MONGO_INITDB_ROOT_PASSWORD: password
    networks:
      - twake-network
    volumes:
      - ./data/mongodb_data/db:/data/db
    ports:
      - "27017:27017"
    command: [ "mongod", "--bind_ip", "0.0.0.0" ]
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "'quit(db.runCommand({ ping: 1 }).ok ? 0 : 2)'",
        ]
      start_period: 40s
      interval: 10s
      timeout: 10s
      retries: 10


  rabbitmq:
    image: rabbitmq:3.13.3-management
    container_name: rabbitmq
    restart: unless-stopped
    networks:
      - twake-network
    ports:
      - "15672:15672"  # Management UI
      - "5672:5672"    # AMQP port
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 3s
      timeout: 30s
      retries: 3
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
      
            
volumes:
  postgres_data:

networks:
  twake-network:
    external: true